# High-level configurations for the Nginx server
events {
    # The maximum number of simultaneous connections that can be opened by a worker process
    worker_connections 1024;
}

http {
    # The server block defines a virtual server
    server {
        # Listen on port 80 (the default HTTP port)
        listen 80;
        
        # You can set a domain name here if you have one, or just use localhost / IP.
        server_name localhost;

        # All requests matching "/" will be forwarded (proxied) to the Spring Boot app
        location / {
            # Route traffic to the "api" service defined in docker-compose.yml
            # Notice we are referencing the container name ("api") on port 8080!
            proxy_pass http://api:8080;
            
            # These headers pass important info about the original client to Spring Boot
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: Setup a special block if you wanted to serve static front-end files
        # location /static/ {
        #     root /usr/share/nginx/html;
        # }
    }
}
